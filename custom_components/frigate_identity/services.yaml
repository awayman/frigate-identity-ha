regenerate_dashboard:
  name: Regenerate dashboard
  description: Regenerate the Frigate Identity dashboard and related Lovelace resources.
get_registry_status:
  name: Get registry status
  description: Log the current person registry status to help diagnose dashboard issues.
set_debug_mode:
  name: Set debug mode
  description: Enable or disable debug logging in the Frigate Identity Service for troubleshooting misidentifications.
  fields:
    enabled:
      name: Enabled
      description: Enable or disable debug logging
      required: true
      selector:
        boolean:

clear_embeddings:
  name: Clear embeddings
  description: Clear all learned person embeddings in the Frigate Identity Service.
  fields:
    reason:
      name: Reason
      description: Optional note recorded by the service logs when clearing embeddings.
      required: false
      selector:
        text:

update_person_profile:
  name: Update person profile
  description: Mark a person as child/adult and set safe zones where a child can be unsupervised.
  fields:
    person_name:
      name: Person name
      description: Name of the person to configure.
      required: true
      selector:
        text:
    is_child:
      name: Is child
      description: Whether this person should be treated as a child for supervision logic.
      required: false
      selector:
        boolean:
    safe_zones:
      name: Safe zones
      description: List of zone names where this child can be alone.
      required: false
      selector:
        object:

update_child_safe_zones:
  name: Update child safe zones
  description: Backward-compatible alias for updating safe zones only.
  fields:
    person_name:
      name: Person name
      description: Name of the child to configure.
      required: true
      selector:
        text:
    safe_zones:
      name: Safe zones
      description: List of zone names where this child can be alone.
      required: false
      selector:
        object: